# Cloud Build config for the new headless webhook backend (webhook_server.py).
# Deploys as a SEPARATE Cloud Run service from the old Streamlit app, so the
# old UI keeps running unchanged until the new flow is confirmed end-to-end.
#
# --no-cpu-throttling ("CPU always allocated") is required: the webhook
# responds 202 immediately and keeps scraping in a FastAPI BackgroundTask
# after the response is sent — without this flag Cloud Run may freeze the
# instance's CPU right after the response and the background work will stall.
#
# --min-instances=1 keeps one warm instance so the CRM's webhook call never
# hits a cold start. Cold starts were the root cause of jobs stranded in
# "pending": the first call after idle could exceed the CRM's request timeout
# and fail silently, while the next (warm) call succeeded.
#
# The deployed service runs in europe-west1 (keep _REGION in sync with the
# actual Cloud Run region — a mismatch makes `gcloud run services describe`
# report the service as missing). Artifact Registry uses the same region.
#
# TODO: fill in YOUR_PROJECT_ID (and adjust _REGION/_SERVICE below if needed).
substitutions:
  _REGION: europe-west1
  _SERVICE: selltic-scraper-webhook

images:
  - "${_REGION}-docker.pkg.dev/YOUR_PROJECT_ID/${_SERVICE}/${_SERVICE}:${SHORT_SHA}"

steps:
  - name: "gcr.io/cloud-builders/docker"
    args:
      - "build"
      - "-f"
      - "Dockerfile.webhook"
      - "-t"
      - "${_REGION}-docker.pkg.dev/YOUR_PROJECT_ID/${_SERVICE}/${_SERVICE}:${SHORT_SHA}"
      - "."

  - name: "gcr.io/cloud-builders/docker"
    args:
      - "push"
      - "${_REGION}-docker.pkg.dev/YOUR_PROJECT_ID/${_SERVICE}/${_SERVICE}:${SHORT_SHA}"

  - name: "gcr.io/google-cloud-sdk/slim"
    entrypoint: "gcloud"
    args:
      - "run"
      - "deploy"
      - "${_SERVICE}"
      - "--image=${_REGION}-docker.pkg.dev/YOUR_PROJECT_ID/${_SERVICE}/${_SERVICE}:${SHORT_SHA}"
      - "--region=${_REGION}"
      - "--platform=managed"
      - "--no-cpu-throttling"
      - "--min-instances=1"
      - "--allow-unauthenticated"

options:
  logging: CLOUD_LOGGING_ONLY
